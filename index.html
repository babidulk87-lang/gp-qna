<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP QnA - Student App</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .header { background: linear-gradient(135deg, #2d6a4f, #1b4332); color: white; padding: 25px; border-radius: 0 0 25px 25px; text-align: center; margin: -15px -15px 20px -15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Developer Profile Section */
        .dev-box { background: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; display: none; }
        .dev-photo { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #2d6a4f; object-fit: cover; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin-bottom: 10px; }
        .dev-name { display: block; font-weight: bold; color: #1b4332; font-size: 1.2rem; }

        /* Question Cards */
        .q-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 6px solid #2d6a4f; }
        .q-meta { font-size: 0.8rem; color: #666; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .q-text { font-weight: bold; color: #2d6a4f; font-size: 1.1rem; margin-bottom: 12px; display: block; }
        .a-text { color: #444; font-size: 1rem; line-height: 1.6; padding-top: 12px; border-top: 1px solid #eee; display: block; }
        #loading { text-align: center; color: #2d6a4f; font-weight: bold; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">GP QnA Portal</h1>
    </div>

    <div class="dev-box" id="devSection">
        <img id="dispPhoto" class="dev-photo" src="" alt="Dev">
        <span id="dispName" class="dev-name"></span>
    </div>

    <div id="loading">Sawal load ho rahe hain...</div>
    <div id="questionsList"></div>

    <script>
        // Aapki Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAvuC2IFJoBZgfb93Al1d9OAVc7nuGXoTI",
            authDomain: "gp-chat-2.firebaseapp.com",
            databaseURL: "https://gp-chat-2-default-rtdb.firebaseio.com",
            projectId: "gp-chat-2",
            storageBucket: "gp-chat-2.firebasestorage.app",
            messagingSenderId: "443746782465",
            appId: "1:443746782465:web:39458e645904f2b7f3df00"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. Developer Profile Fetch (Real-time)
        database.ref('developer').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('devSection').style.display = "block";
                document.getElementById('dispPhoto').src = data.photo;
                document.getElementById('dispName').innerText = "Developer: " + data.name;
            }
        });

        // 2. Questions Fetch (Real-time)
        database.ref('questions').on('value', (snap) => {
            const list = document.getElementById('questionsList');
            const loader = document.getElementById('loading');
            list.innerHTML = "";
            loader.style.display = "none";
            
            if(!snap.exists()) {
                list.innerHTML = "<p style='text-align:center;'>Abhi tak koi sawal upload nahi kiya gaya.</p>";
                return;
            }

            snap.forEach((child) => {
                const q = child.val();
                list.innerHTML = `
                    <div class="q-card">
                        <div class="q-meta">${q.class || 'N/A'} | ${q.subject || 'General'}</div>
                        <span class="q-text">Q: ${q.question}</span>
                        <span class="a-text">A: ${q.answer}</span>
                    </div>
                ` + list.innerHTML; // Naya sawal sabse upar dikhega
            });
        });
    </script>
</body>
</html>
